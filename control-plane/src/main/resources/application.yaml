spring:
    application:
        name: digital-banking-control-plane
    flyway:
        clean-disabled: true
    jackson:
        deserialization:
            fail-on-unknown-properties: true

management:
    endpoints:
        web:
            exposure:
                include: health
    endpoint:
        health:
            show-details: never
            probes:
                enabled: true

digital-banking:
    transfer:
        default-network: ETHEREUM
    delivery-worker:
        enabled: false
