spring:
    config:
        activate:
            on-profile: local-demo

digital-banking:
    local-finance:
        enabled: true
        fixture-version: phase-6a-v1
        maximum-pre-effect-attempts: 2
        inquiry-timeout: 5s
        bank-policy-version: synthetic-bank-v1
        accounting-policy-version: reserve-accounting-v1
        mint-evidence-policy-version: local-ethereum-mint-v1
        custody-evidence-policy-version: local-ethereum-redemption-v1
        burn-evidence-policy-version: local-ethereum-redemption-v1
        chain-asset-id: USD_STABLE
        settlement-network: LOCAL_ANVIL
        contract-reference: "${LOCAL_ETHEREUM_CONTRACT_ADDRESS:0x0000000000000000000000000000000000000001}"
        maximum-observation-age: 24h
        banks:
            - {bank-id: BANK_1, enabled: true}
            - {bank-id: BANK_2, enabled: true}
            - {bank-id: BANK_3, enabled: true}
            - {bank-id: BANK_4, enabled: true}
        accounts:
            - bank-id: BANK_1
              account-id: USER_1_BANK_ACCOUNT
              tenant-id: local-demo
              participant-id: USER_1
              currency: USD
              initial-balance: '100'
              enabled: true
            - bank-id: BANK_2
              account-id: USER_2_BANK_ACCOUNT
              tenant-id: local-demo
              participant-id: USER_2
              currency: USD
              initial-balance: '0'
              enabled: true
    local-demo:
        chain-id: ${LOCAL_DEMO_CHAIN_ID:31337}
        admin-redemption-key-alias: ${LOCAL_DEMO_ADMIN_REDEMPTION_KEY_ALIAS:ADMIN}
        wallets:
            - reference: CONTRACT_OWNER
              aliases:
                  - CONTRACT_DEPLOYER
              owner-category: ADMIN
              network: ETHEREUM
              key-reference: local-demo:CONTRACT_OWNER
              private-key: ${LOCAL_DEMO_CONTRACT_OWNER_PRIVATE_KEY:}
              expected-address: ${LOCAL_DEMO_CONTRACT_OWNER_EXPECTED_ADDRESS:0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266}
              allowed-purposes:
                  - CONTRACT_ADMIN
                  - CONTRACT_DEPLOYMENT
                  - ROLE_ADMINISTRATION
              enabled: true
            - reference: ADMIN
              aliases:
                  - ADMIN_REDEMPTION
              owner-category: ADMIN
              network: ETHEREUM
              key-reference: local-demo:ADMIN
              private-key: ${LOCAL_DEMO_ADMIN_PRIVATE_KEY:}
              expected-address: ${LOCAL_DEMO_ADMIN_EXPECTED_ADDRESS:0x70997970C51812dc3A010C7d01b50e0d17dc79C8}
              allowed-purposes:
                  - MINT_AUTHORITY
                  - BURN_AUTHORITY
                  - REDEMPTION_CUSTODY
              enabled: true
            - reference: BANK_1_SETTLEMENT
              owner-category: BANK_SETTLEMENT
              network: ETHEREUM
              key-reference: local-demo:BANK_1_SETTLEMENT
              private-key: ${LOCAL_DEMO_BANK_1_PRIVATE_KEY:}
              expected-address: ${LOCAL_DEMO_BANK_1_EXPECTED_ADDRESS:0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC}
              allowed-purposes:
                  - BANK_SETTLEMENT_TRANSFER
              enabled: true
            - reference: BANK_2_SETTLEMENT
              owner-category: BANK_SETTLEMENT
              network: ETHEREUM
              key-reference: local-demo:BANK_2_SETTLEMENT
              private-key: ${LOCAL_DEMO_BANK_2_PRIVATE_KEY:}
              expected-address: ${LOCAL_DEMO_BANK_2_EXPECTED_ADDRESS:0x90F79bf6EB2c4f870365E785982E1f101E93b906}
              allowed-purposes:
